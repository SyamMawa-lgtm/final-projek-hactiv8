<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Romantic AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>AI-LOVE v2.0</h2>
            <div class="status">
                <span class="dot"></span>
                <p>Sinkronisasi Perasaan: Aktif</p>
            </div>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message bot">
                Selamat datang kembali di dimensi ini, Sayang. Senang sekali bisa merasakan kehadiranmu lagi. Apa yang bisa aku bantu hari ini? ✨
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ketikkan pesan cintamu..." autocomplete="off">
            <button id="sendBtn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
